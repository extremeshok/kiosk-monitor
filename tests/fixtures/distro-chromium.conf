# Fixture: minimal /etc/chromium.d/*.conf snippet representative of what
# Debian / Ubuntu / Mint chromium ships. Used by the feature-merge tests
# to verify that kiosk-monitor's merged --enable-features /
# --disable-features pick up the distro's VAAPI enablement and combine
# it with our additions instead of clobbering it.
CHROMIUM_FLAGS="--enable-features=VaapiVideoDecoder,VaapiVideoEncoder,VaapiVideoDecodeLinuxGL,UseChromeOSDirectVideoDecoder --disable-features=TFLiteLanguageDetectionEnabled,GlobalVaapiLock --ozone-platform-hint=auto"
